<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeHarness学习助手 - 控制台</title>
  <link rel="stylesheet" href="css/viewer.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <div id="statusBar" class="status-bar">
    <span id="connectionStatus" class="status connecting">连接中</span>
    <span id="resolutionDisplay">-</span>
    <span id="fpsDisplay">0 FPS</span>
    <span id="latencyDisplay">0 ms</span>
    <span id="candidateDisplay">链路 -</span>
    <span id="keyInputDisplay" class="key-input-display">-</span>
    <button id="refreshBtn" class="control-btn">刷新画面</button>
    <button id="diagBtn" class="control-btn">诊断日志</button>
    <button id="toggleControlsBtn" class="control-btn">隐藏控件</button>
  </div>
  
  <div class="viewer-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <img id="relayImage" class="relay-image hidden" alt="Tunnel relay stream">
    <div id="loading" class="stream-placeholder">
      <div class="spinner"></div>
      <p id="loadingText">点击开始连接，基础控制已就绪</p>
      <button id="startBtn" class="start-btn">开始学习助手</button>
    </div>
  </div>
  
  <div class="control-bar">
    <button id="scaleBtn" class="control-btn">
      缩放：自适应
    </button>
    <button id="resolutionBtn" class="control-btn">
      分辨率设置
    </button>
    <button id="fullscreenBtn" class="control-btn">
      全屏
    </button>
    <button id="networkModeBtn" class="control-btn">
      网络：自动
    </button>
    <button id="pauseBtn" class="control-btn">
      暂停
    </button>
    <button id="disconnectBtn" class="control-btn danger">
      断开连接
    </button>
  </div>

  <div class="action-bar">
    <button class="action-btn" data-action="enter">回车</button>
    <button class="action-btn" data-action="up">上</button>
    <button class="action-btn" data-action="down">下</button>
    <button class="action-btn" data-action="left">左</button>
    <button class="action-btn" data-action="right">右</button>
    <button id="keyboardModeBtn" class="action-btn" title="切换 Windows / Mac 键盘映射">键盘：-</button>
    <button class="action-btn" data-action="copy">复制</button>
    <button class="action-btn" data-action="paste">粘贴</button>
    <button class="action-btn" data-action="cut">剪切</button>
    <button class="action-btn" data-action="undo">撤销</button>
    <button class="action-btn" data-action="selectAll">全选</button>
    <button class="action-btn" data-action="save">保存</button>
    <button class="action-btn" data-action="find">查找</button>
    <button class="action-btn" data-action="showDock">显示程序坞</button>
    <button class="action-btn" data-action="screenshot">截屏</button>
    <button class="action-btn" data-action="switchInputMethod">切换输入法</button>
  </div>
  
  <div id="resolutionModal" class="modal hidden">
    <div class="modal-content">
      <h3>选择分辨率</h3>
      <div class="resolution-options">
        <label class="resolution-option">
          <input type="radio" name="resolution" value="540p" data-width="960" data-height="540">
          <span>540p (流畅)</span>
        </label>
        <label class="resolution-option">
          <input type="radio" name="resolution" value="720p" data-width="1280" data-height="720" checked>
          <span>720p (标准)</span>
        </label>
        <label class="resolution-option">
          <input type="radio" name="resolution" value="900p" data-width="1600" data-height="900">
          <span>900p (高清)</span>
        </label>
        <label class="resolution-option">
          <input type="radio" name="resolution" value="1080p" data-width="1920" data-height="1080">
          <span>1080p (超清 · 高性能)</span>
        </label>
      </div>
      <button id="applyResolution" class="modal-btn primary">应用</button>
      <button id="closeResolution" class="modal-btn">取消</button>
    </div>
  </div>

  <div id="networkAdvisor" class="network-advisor" aria-live="polite">
    <div class="network-advisor__top">
      <span id="networkAdvisorTitle">网络模式：自动</span>
      <span id="networkAdvisorState" class="network-advisor__state">检测中</span>
    </div>
    <p id="networkAdvisorText">自动优先直连，失败时使用可用中继。</p>
  </div>

  <div id="networkModal" class="modal hidden">
    <div class="modal-content network-modal-content">
      <h3>网络模式</h3>
      <div class="network-options">
        <label class="network-option">
          <input type="radio" name="networkMode" value="lan">
          <span>
            <strong>本地直连</strong>
            <small>访问电脑和这台 Mac 在同一局域网时使用，延迟最低。</small>
          </span>
        </label>
        <label class="network-option">
          <input type="radio" name="networkMode" value="auto" checked>
          <span>
            <strong>自动穿透</strong>
            <small>默认模式。先尝试直连和 STUN，有 TURN 时自动兜底。</small>
          </span>
        </label>
        <label class="network-option">
          <input type="radio" name="networkMode" value="stun">
          <span>
            <strong>外网直连</strong>
            <small>外网但 UDP 未被限制时使用；失败时需要切换中继。</small>
          </span>
        </label>
        <label class="network-option">
          <input type="radio" name="networkMode" value="relay">
          <span>
            <strong>外网中继</strong>
            <small>公司网、校园网、跨运营商或画面一直为 0 FPS 时使用；需要配置 TURN。</small>
          </span>
        </label>
        <label class="network-option">
          <input type="radio" name="networkMode" value="tunnel">
          <span>
            <strong>隧道中继</strong>
            <small>TURN 也失败时使用，视频通过 Cloudflare/Socket.IO 转发，FPS 较低但最稳。</small>
          </span>
        </label>
      </div>
      <p id="networkTurnStatus" class="network-turn-status">正在读取 TURN 配置...</p>
      <button id="applyNetworkMode" class="modal-btn primary">应用并重连</button>
      <button id="closeNetworkMode" class="modal-btn">取消</button>
    </div>
  </div>
  
  <div id="diagModal" class="modal hidden">
    <div class="modal-content" style="min-width: 600px; max-width: 90vw;">
      <h3>前端诊断日志</h3>
      <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;">最近捕获的浏览器控制台日志，点击发送可将日志传给服务端分析。</p>
      <div id="latencyPanel" style="margin-bottom: 16px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: var(--radius-md); font-family: 'JetBrains Mono', monospace; font-size: 12px;">
        <h4 style="margin: 0 0 8px 0; color: var(--text-primary); font-size: 13px;">延迟分析 (5秒窗口)</h4>
        <div id="latencyStats" style="display: grid; grid-template-columns: 80px 1fr 80px; gap: 4px 8px; color: var(--text-secondary);">
          <span>采集:</span> <div class="latency-bar"><div id="barCapture" style="width:0%"></div></div> <span id="valCapture">-</span>
          <span>编码:</span> <div class="latency-bar"><div id="barEncode" style="width:0%"></div></div> <span id="valEncode">-</span>
          <span>执行:</span> <div class="latency-bar"><div id="barExecute" style="width:0%"></div></div> <span id="valExecute">-</span>
          <span>网络:</span> <div class="latency-bar"><div id="barNetwork" style="width:0%"></div></div> <span id="valNetwork">-</span>
          <span>缓冲:</span> <div class="latency-bar"><div id="barPlayout" style="width:0%"></div></div> <span id="valPlayout">-</span>
          <span>输入→画面:</span> <div class="latency-bar"><div id="barInput" style="width:0%"></div></div> <span id="valInput">-</span>
        </div>
        <div id="latencySync" style="margin-top: 8px; color: var(--text-muted); font-size: 11px;">时钟同步: 未同步</div>
      </div>
      <div id="keyboardDebugPanel" style="margin-bottom: 12px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: var(--radius-md);">
        <h4 style="margin: 0 0 8px 0; color: var(--text-primary); font-size: 13px;">键盘链路视图</h4>
        <textarea id="keyboardDebugArea" readonly style="width: 100%; height: 140px; background: rgba(0,0,0,0.4); color: #89ddff; font-family: 'JetBrains Mono', monospace; font-size: 12px; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px; resize: none; outline: none; line-height: 1.5;"></textarea>
      </div>
      <textarea id="diagLogArea" readonly style="width: 100%; height: 320px; background: rgba(0,0,0,0.4); color: #c3e88d; font-family: 'JetBrains Mono', monospace; font-size: 12px; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 12px; resize: none; outline: none; line-height: 1.5;"></textarea>
      <div style="display: flex; gap: 10px; margin-top: 16px;">
        <button id="sendDiagBtn" class="modal-btn primary">发送日志到服务端</button>
        <button id="clearDiagBtn" class="modal-btn">清空日志</button>
        <button id="closeDiagBtn" class="modal-btn">关闭</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/input.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/latency-monitor.js"></script>
  <script src="js/diagnostic.js"></script>
</body>
</html>
